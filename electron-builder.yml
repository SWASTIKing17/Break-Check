appId: com.bloomx.freexan
productName: "freeXan"
copyright: "Copyright © 2025 BloomX"

# ── Source & Output ───────────────────────────────────────────────────────────
directories:
  output: dist
  buildResources: build

# ── Files to bundle ───────────────────────────────────────────────────────────
files:
  - "**/*"
  - "!dist/**"
  - "!CEPs/**"
  - "!cep-extension/**"   # superseded by plugins/Link_freeXan + plugins/Audio_freeXan
  - "!**/*.md"
  - "!node_modules/.cache/**"
  - "!node_modules/.bin/**"
  - "!.claude/**"
  - "!.agent/**"
  - "!graphify-out/**"
  - "!docs/**"

# Native modules and runtime files must live outside the ASAR archive
# so Node can load them as regular files from disk.
asarUnpack:
  - "node_modules/better-sqlite3/**/*"
  - "node_modules/@ffmpeg-installer/**/*"
  - "plugins/**/*"
  - "blank_template.prproj"
  - "Premiere Pro Utilities/**"
  - "tray_icon.png"

# Extra resources placed next to the executable (not inside ASAR).
# Plugins must be reachable from NSIS at install time to copy them into
# %APPDATA%/Adobe/CEP/extensions/ based on user component selection.
extraResources:
  - from: "plugins"
    to: "plugins"
    filter:
      - "**/*"
  # Bundle release notes for in-app "What's New" access at runtime
  # (readable via `process.resourcesPath + '/RELEASE_NOTES.md'`).
  - from: "RELEASE_NOTES.md"
    to: "RELEASE_NOTES.md"

# Files copied directly to the install dir root (next to the .exe) so users
# can find them via File Explorer / "Open file location" on the shortcut.
extraFiles:
  - from: "RELEASE_NOTES.md"
    to: "RELEASE_NOTES.md"

# ── Windows ───────────────────────────────────────────────────────────────────
win:
  # Place icon.ico in the build/ folder (256x256 recommended).
  # If missing, electron-builder uses a default icon.
  icon: "build/icon.ico"
  target:
    - target: nsis
      arch:
        - x64

# ── NSIS Installer ────────────────────────────────────────────────────────────
nsis:
  # Wizard install — shows a components page so the user can pick which
  # CEP plugins to install alongside freeXan. All checked by default.
  oneClick: false

  # Per-user install — no admin/UAC prompt required.
  perMachine: false
  allowElevation: false

  # Shortcuts
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "freeXan"

  # Launch the app automatically after installation finishes.
  runAfterFinish: true

  # Allow the user to change the install directory.
  allowToChangeInstallationDirectory: true

  # Custom installer/uninstaller script — adds the plugin components page,
  # writes plugins-enabled.json, sets startup + CEP debug registry.
  include: "build/installer.nsh"
