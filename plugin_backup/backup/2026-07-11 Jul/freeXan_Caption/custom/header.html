<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        body {
            -webkit-user-select: none;
            background: #121214;
            cursor: default;
            margin: 0;
            padding: 0;
            font-family: 'IBM Plex Sans', sans-serif;
            color: #f3f3f5;
            overflow: hidden;
        }

        .header-shell {
            position: relative;
            width: 100%;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 22px;
            box-sizing: border-box;
            background:
                radial-gradient(120% 180% at 0% 50%, rgba(153, 125, 255, 0.18) 0%, rgba(153, 125, 255, 0) 55%),
                linear-gradient(90deg, #0c0c0e 0%, #121214 55%, #161618 100%);
            border-bottom: 1px solid rgba(153, 125, 255, 0.18);
        }

        .header-shell::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(153, 125, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(153, 125, 255, 0.04) 1px, transparent 1px);
            background-size: 16px 16px;
            opacity: 0.5;
            pointer-events: none;
        }

        .brand {
            display: flex;
            align-items: baseline;
            gap: 10px;
            position: relative;
            z-index: 1;
        }

        .brand .mark {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #997DFF;
            padding: 3px 8px;
            border: 1px solid rgba(153, 125, 255, 0.45);
            border-radius: 2px;
            background: rgba(153, 125, 255, 0.07);
            line-height: 1;
        }

        .brand .name {
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: -0.01em;
            color: #f3f3f5;
            line-height: 1;
        }

        .brand .name .accent {
            color: #997DFF;
        }

        .brand .tag {
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 400;
            font-size: 10px;
            color: #5e5e66;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            margin-left: 4px;
        }
    </style>
</head>

<body>
    <div class="header-shell">
        <div class="brand">
            <span class="mark">freeXan</span>
            <span class="name">Caption<span class="accent">.</span></span>
            <span class="tag">by BloomX</span>
        </div>
    </div>
</body>

</html>
